name: CI

# NOES-38 / NOES-54: stub workflow.
#
# The full pytest workflow against requirements.txt cannot run until
# NOES-54 (regenerate requirements.txt without conda contamination +
# version-resolution conflicts) ships. Surfaced during NOES-38 setup:
# requirements.txt has pytest==9.0.2 conflicting with the
# pytest-asyncio it pins to (depends on pytest<9), and ~127 fully-pinned
# deps with various pip-freeze-from-conda artifacts (NOES-54 + NOES-57).
#
# Until then, this stub proves CI is wired up and branch protection is
# active. It runs on every push/PR. NOES-54 will replace it with a real
# pytest job.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: CI wired up (NOES-54 will land real tests)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke check
        run: |
          python --version
          echo "CI is wired up on genai-agent-core."
          echo "Real pytest job blocked on NOES-54 (requirements.txt regeneration)."
