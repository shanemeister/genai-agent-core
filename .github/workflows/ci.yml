name: CI

# NOES-38: Axiom Core CI. This repo is the Linux-deployed copy of code
# edited on Mac at genai-workshop/core/; it receives changes via rsync
# (per docs/architecture/linux_runtime.md §2). Branch protection on
# main allows direct push from the rsync deploy user to preserve that
# workflow; CI runs on the push and reports status.
#
# Source of truth for the affirmative-acknowledgment design this
# enforces: docs/architecture/poa_hac_safety_layer.md Appendix B
# item 22 (in the genai-workshop repo).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # requirements.txt is fully pinned (~127 deps including accelerate,
      # faiss, huggingface-hub). This will take ~2-3 min on a cold cache
      # but pip's GitHub Actions cache keys on the requirements file
      # content so repeat runs hit warm cache in ~30s.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest -v --tb=short
